name: Update top10k

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Refresh top10k.json
        run: node scripts/update-top-packages.mjs
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(data): refresh top10k.json"
          title: "chore(data): refresh top10k.json"
          body: |
            Automated weekly refresh of the typosquat reference list.
          branch: chore/refresh-top10k
          add-paths: |
            data/top10k.json
